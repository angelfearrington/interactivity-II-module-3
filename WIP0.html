<body>
    <h1>In Passing</h1>
    <p>Poem by: Matthew Shenoda, Page by: Angel Fearrington</p>

<div class="container">
    <button type="button" onclick="openNextButton('button2')" id="button1">There is something inside each of us</button>
    <button type="button" class="hidden" onclick="openNextButton('button3')" id="button2">that scurries toward the past in our bodies a rooted history</button>
    <button type="button" class="hidden" onclick="openNextButton('button4')" id="button3">perhaps in the balls of our feet</button>
    <button type="button" class="hidden" onclick="openNextButton('button5')" id="button4">a microscopic yearning that floats inside that sphere</button>
    <button type="button" id="button5" class="hidden" onclick="openNextButton('button6')" >yearning in a language we've forgotten.</textarea>
    <button type="button" class="hidden" onclick="openNextButton('button7')" id="button6">History is too in our knees</button>
    <button type="button" class="hidden" id="button7" onclick="openNextButton('button8')">in the ball that pops & twists as we journey.</button>
    <button type="button" class="hidden" id="button8" onclick="openNextButton('button9')">And for those of us blessed to be old</button>
    <button type="button" class="hidden" id="button9" onclick="openNextButton('button10')">& for those of us blessed to be young</button>
    <button type="button" class="hidden" id="button10" onclick="openNextButton('button11')">it lives inside the tiny ball of skin</button>
    <button type="button" class="hidden" id="button11" onclick="openNextButton('button12')">deep inside the belly button</button>
    <button type="button" class="hidden" id="button12" onclick="openNextButton('button13')">tickles recollections from our tongues</button>
    <button type="button" class="hidden" id="button13" onclick="openNextButton('button14')">stories of stories from then---</button>
    <button type="button" class="hidden" id="button14" onclick="openNextButton('button15')">history lives in circles & spheres</button>
    <button type="button" class="hidden" id="button15" onclick="openNextButton('button16')">floating</button>
    <button type="button" class="hidden" id="button16" onclick="openNextButton('button17')">always suspended</button>
    <button type="button" class="hidden" id="button17">waiting for release.</button>
</div>
